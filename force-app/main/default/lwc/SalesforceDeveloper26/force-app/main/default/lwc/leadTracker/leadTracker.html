<!-- UI reviewed and refined - March 2026 -->
<template>
    <lightning-card title="Lead Tracker" icon-name="standard:lead">
        <div class="slds-p-around_medium">

            <template if:true={successMsg}>
                <div class="slds-notify slds-notify_toast slds-theme_success
                            slds-m-bottom_small">
                    <p>{successMsg}</p>
                </div>
            </template>

            <template if:true={errorMsg}>
                <div class="slds-notify slds-notify_toast slds-theme_error
                            slds-m-bottom_small">
                    <p>{errorMsg}</p>
                </div>
            </template>

            <template if:true={leads.data}>
                <table class="slds-table slds-table_cell-buffer
                              slds-table_bordered">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th>Lead Name</th>
                            <th>Lead Source</th>
                            <th>Industry</th>
                            <th>Rating</th>
                            <th>Status</th>
                            <th>Update Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={leads.data} for:item="lead">
                            <tr key={lead.Id}>
                                <td>{lead.Name}</td>
                                <td>{lead.LeadSource}</td>
                                <td>{lead.Industry}</td>
                                <td>{lead.Rating}</td>
                                <td>{lead.Status}</td>
                                <td>
                                    <lightning-combobox
                                        data-id={lead.Id}
                                        placeholder="Update Status"
                                        options={statusOptions}
                                        onchange={handleStatusChange}>
                                    </lightning-combobox>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>

            <template if:true={leads.error}>
                <p class="slds-text-color_error">
                    Error loading leads.
                </p>
            </template>

        </div>
    </lightning-card>
</template>
