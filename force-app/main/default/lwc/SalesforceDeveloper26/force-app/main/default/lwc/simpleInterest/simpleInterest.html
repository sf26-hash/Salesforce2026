<template>
    <lightning-card title="Simple Interest Calculator" icon-name="utility:money">
        <div class="slds-p-around_medium">

            <lightning-input
                label="Principal Amount (₹)"
                type="number"
                data-id="principal"
                placeholder="e.g. 10000"
                class="slds-m-bottom_small">
            </lightning-input>

            <lightning-input
                label="Rate of Interest (% per year)"
                type="number"
                data-id="rate"
                placeholder="e.g. 5"
                class="slds-m-bottom_small">
            </lightning-input>

            <lightning-input
                label="Time (years)"
                type="number"
                data-id="time"
                placeholder="e.g. 2"
                class="slds-m-bottom_small">
            </lightning-input>

            <lightning-button
                label="Calculate"
                variant="brand"
                onclick={handleCalculate}
                class="slds-m-top_small">
            </lightning-button>

            <lightning-button
                label="Reset"
                variant="neutral"
                onclick={handleReset}
                class="slds-m-left_small slds-m-top_small">
            </lightning-button>

            <!-- Result -->
            <template if:true={result}>
                <div class="slds-box slds-m-top_medium slds-text-align_center">
                    <p class="slds-text-color_weak slds-text-heading_small">
                        RESULT
                    </p>
                    <p class="slds-m-top_small">
                        Simple Interest: <strong>₹{interest}</strong>
                    </p>
                    <p class="slds-m-top_small">
                        Total Amount: <strong>₹{totalAmount}</strong>
                    </p>
                </div>
            </template>

            <!-- Error -->
            <template if:true={errorMsg}>
                <p class="slds-text-color_error slds-m-top_small">
                    {errorMsg}
                </p>
            </template>

        </div>
    </lightning-card>
</template>
