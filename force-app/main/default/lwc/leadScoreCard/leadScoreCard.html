<template>
    <lightning-card title="Lead Score Calculator" icon-name="standard:lead">
        <div class="slds-p-around_medium">

            <lightning-combobox
                label="Industry"
                value={industry}
                placeholder="Select Industry"
                options={industryOptions}
                onchange={handleIndustryChange}>
            </lightning-combobox>

            <lightning-combobox
                label="Lead Source"
                value={source}
                placeholder="Select Source"
                options={sourceOptions}
                onchange={handleSourceChange}
                class="slds-m-top_small">
            </lightning-combobox>

            <lightning-input
                label="Number of Employees"
                type="number"
                value={employees}
                onchange={handleEmployeeChange}
                class="slds-m-top_small">
            </lightning-input>

            <div class="slds-m-top_medium">
                <lightning-button
                    label="Calculate Score"
                    variant="brand"
                    onclick={handleCalculate}>
                </lightning-button>
                <lightning-button
                    label="Reset"
                    variant="neutral"
                    onclick={handleReset}
                    class="slds-m-left_small">
                </lightning-button>
            </div>

            <template if:true={showResult}>
                <div class="slds-m-top_large slds-box slds-text-align_center">
                    <p class="slds-text-heading_small slds-text-color_weak">LEAD RATING</p>
                    <p class="slds-text-heading_large">{scoreLabel}</p>
                    <p class="slds-text-heading_medium slds-m-top_small">Score: {score} / 85</p>
                    <lightning-progress-bar
                        value={scorePercent}
                        size="large"
                        class="slds-m-top_small">
                    </lightning-progress-bar>
                </div>
            </template>

            <template if:true={showError}>
                <div class="slds-m-top_medium">
                    <p class="slds-text-color_error">⚠️ Please fill all fields before calculating.</p>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
